<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AVAS Consult</title>
  <style>
    :root {
      --navy: #0f2b46;
      --text: #1f2937;
      --muted: #6b7280;
      --bg: #f7f7f8;
      --card: #ffffff;
      --border: #e5e7eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      padding: 24px;
    }

    .card {
      width: min(680px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 28px;
      text-align: center;
    }

    h1 {
      margin: 0 0 8px;
      color: var(--navy);
      font-size: 34px;
      line-height: 1.2;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>AVAS Consult</h1>
    <p>Site em construção.</p>
  </main>
</body>
</html>
